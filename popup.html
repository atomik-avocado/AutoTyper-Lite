<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AutoTyper Lite</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #1c1c1c;
        --panel: #232323;
        --text: #e8e6e1;
        --muted: #8a8780;
        --border: #353330;
        --accent: #d97757;
        --danger: #c9695e;
        --field: #1a1a1a;
      }

      html[data-theme="light"] {
        color-scheme: light;
        --bg: #f5f1ea;
        --panel: #faf7f2;
        --text: #1f1d1a;
        --muted: #7a766e;
        --border: #d9d3c7;
        --field: #ffffff;
      }

      html[data-theme="dark"] {
        color-scheme: dark;
      }

      * { box-sizing: border-box; }

      body {
        width: 100%;
        min-width: 320px;
        margin: 0;
        padding: 18px 16px 20px;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Helvetica Neue", sans-serif;
        font-size: 13px;
        line-height: 1.4;
      }

      .shell {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--border);
      }

      h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: 0;
      }

      h1 .dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        margin-right: 7px;
        border-radius: 50%;
        background: var(--accent);
        vertical-align: 1px;
      }

      .meta {
        color: var(--muted);
        font-size: 11px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
      }

      .theme-toggle {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 0;
        background: none;
        border: 0;
        color: var(--muted);
        font-size: 11px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        cursor: pointer;
      }

      .theme-toggle:hover { color: var(--text); }

      .theme-toggle input {
        appearance: none;
        width: 22px;
        height: 12px;
        margin: 0;
        border-radius: 6px;
        background: var(--border);
        position: relative;
        cursor: pointer;
      }

      .theme-toggle input::after {
        content: "";
        position: absolute;
        top: 2px;
        left: 2px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--text);
        transition: transform 120ms ease;
      }

      .theme-toggle input:checked::after {
        transform: translateX(10px);
      }

      .field-label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      textarea {
        width: 100%;
        min-height: 130px;
        resize: vertical;
        border: 1px solid var(--border);
        border-radius: 4px;
        outline: none;
        padding: 10px 11px;
        background: var(--field);
        color: var(--text);
        font: 13px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }

      textarea::placeholder { color: var(--muted); }

      textarea:focus {
        border-color: var(--accent);
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .speed-row {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 10px;
      }

      .speed-row .field-label { margin: 0; }

      .speed-value {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 12px;
        color: var(--text);
      }

      input[type="range"] {
        width: 100%;
        accent-color: var(--accent);
        margin: 0;
      }

      .check-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        cursor: pointer;
      }

      .check-row input[type="checkbox"] {
        width: 14px;
        height: 14px;
        margin: 1px 0 0;
        accent-color: var(--accent);
        flex-shrink: 0;
      }

      .check-row span {
        color: var(--muted);
        font-size: 12px;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 6px;
      }

      button {
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        border-radius: 4px;
        padding: 8px 10px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
        transition: border-color 120ms ease, background 120ms ease;
      }

      button:hover:not(:disabled) {
        border-color: var(--muted);
      }

      #startButton:not(:disabled) {
        background: var(--accent);
        border-color: var(--accent);
        color: #1a1a1a;
        font-weight: 500;
      }

      #stopButton:not(:disabled) {
        color: var(--danger);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.5;
      }

      .notice {
        display: none;
        padding: 7px 10px;
        font-size: 11px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        color: var(--muted);
        border-left: 2px solid var(--accent);
        background: var(--panel);
      }

      .notice.visible { display: block; }

      .footer {
        display: flex;
        align-items: center;
        gap: 8px;
        padding-top: 10px;
        border-top: 1px solid var(--border);
      }

      .status {
        flex: 1;
        color: var(--muted);
        font-size: 11px;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      progress {
        width: 80px;
        height: 3px;
        border: 0;
        background: var(--border);
        border-radius: 0;
      }

      progress::-webkit-progress-bar { background: var(--border); }
      progress::-webkit-progress-value { background: var(--accent); }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="header">
        <h1><span class="dot"></span>AutoTyper Lite</h1>
        <label class="theme-toggle" for="themeToggle">
          <span id="themeLabel">dark</span>
          <input id="themeToggle" type="checkbox">
        </label>
      </div>

      <div id="docsNotice" class="notice">google docs mode</div>

      <div>
        <label class="field-label" for="textInput">Text</label>
        <textarea id="textInput" spellcheck="false" placeholder="Type or paste here..."></textarea>
      </div>

      <div class="controls">
        <div>
          <div class="speed-row">
            <label class="field-label" for="speedRange">Speed</label>
            <span id="speedValue" class="speed-value">80 wpm</span>
          </div>
          <input id="speedRange" type="range" min="20" max="200" step="1" value="80">
        </div>
        <label class="check-row" for="typoToggle">
          <input id="typoToggle" type="checkbox">
          <span>Make occasional typos and correct them</span>
        </label>
      </div>

      <div class="actions">
        <button id="startButton">Start</button>
        <button id="pauseButton" disabled>Pause</button>
        <button id="stopButton" disabled>Stop</button>
      </div>

      <div class="footer">
        <div id="statusBar" class="status">click a text field, then start</div>
        <progress id="progressBar" max="1" value="0"></progress>
      </div>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
